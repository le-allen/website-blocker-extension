<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Popup</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      min-width: 400px;
      min-height: 300px;
    }
    .panel {
      padding: 12px;
    }
    .row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }
    .extName {
      font-family: cursive;
    }
    input[type="text"] {
      flex: 1;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }
    button {
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      background: #4b6bfb;
      color: #fff;
      cursor: pointer;
    }
    button:hover {
      background: #3a54d1;
    }
    button.secondary {
      background: #e5e7eb;
      color: #111827;
    }
    button.secondary:hover {
      background: #d1d5db;
    }
    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #eee;
    }
    .host {
      font-size: 14px;
    }
    .host.disabled {
      color: #9ca3af;
      text-decoration: line-through;
    }
    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .switch {
      position: relative;
      display: inline-block;
      width: 38px;
      height: 22px;
      flex-shrink: 0;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #cbd5e1;
      transition: background-color .2s;
      border-radius: 22px;
    }
    .slider::before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background-color: #fff;
      transition: transform .2s;
      border-radius: 50%;
      box-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }
    .switch input:checked + .slider {
      background-color: #4b6bfb;
    }
    .switch input:checked + .slider::before {
      transform: translateX(16px);
    }
    .muted {
      color: #6b7280;
      font-style: italic;
      font-size: 12px;
    }
  </style>
</head>
<body>
    <div class="panel">
      <h2 class="extName">Website Blocker 💥</h2>
      <div class="row">
        <input id="blocked-input" type="text" placeholder="example.com or https://example.com" />
        <button id="add-blocked">Add</button>
      </div>
      <ul id="blocked-list"></ul>
      <span class="muted">Lock in, twin</span>
    </div>


    <script src="popup.js"></script>
</body>
</html>
